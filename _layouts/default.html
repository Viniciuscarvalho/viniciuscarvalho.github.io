<!DOCTYPE html>
<html lang="{{ site.plainwhite.html_lang | default: "pt-br" }}">

<head>
  {%- include head.html -%}
</head>

<body class="bg-surface text-text antialiased">
  {%- include nav.html -%}

  <main id="main-content" {% if page.layout != 'home' %}class="container-page py-12"{% endif %}>
    {{ content }}
  </main>

  {%- include footer.html -%}

  <script>
    (function () {
      // Nav appearance on scroll
      var nav = document.getElementById("site-nav");
      if (nav) {
        window.addEventListener("scroll", function () {
          if (window.scrollY > 10) {
            nav.classList.add("border-border", "shadow-nav");
            nav.classList.remove("border-transparent");
          } else {
            nav.classList.remove("border-border", "shadow-nav");
            nav.classList.add("border-transparent");
          }
        }, { passive: true });
      }

      // Reveal on scroll implementation
      function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        var windowHeight = window.innerHeight;
        var elementVisible = 100;
        
        for (var i = 0; i < reveals.length; i++) {
          var elementTop = reveals[i].getBoundingClientRect().top;
          if (elementTop < windowHeight - elementVisible) {
            reveals[i].classList.add("active", "visible");
          }
        }
      }
      
      window.addEventListener("scroll", reveal);
      document.addEventListener("DOMContentLoaded", reveal);
      // Initial call for elements already in view
      setTimeout(reveal, 100);
    })();
  </script>

  {%- if site.plainwhite.analytics_id -%}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.plainwhite.analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.plainwhite.analytics_id }}');
  </script>
  {%- endif -%}

  {% if site.plainwhite.search %}
  <script src="{{ "/assets/js/simple-jekyll-search.min.js" | relative_url }}"></script>
  <script src="{{ "/assets/js/search.js" | relative_url }}"></script>
  {% endif %}
</body>

</html>
